<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keywords Management - ANMS</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">
    <style>
        .user-bar { color: #ccc; font-size: 0.9em; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0;
                 width: 100%; height: 100%; overflow: auto;
                 background-color: rgba(0,0,0,0.5); padding-top: 60px; }
        .modal-dialog { margin: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="/">ANMS Monitoring</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/honeypots">Honeypots</a></li>
                <li class="nav-item active"><a class="nav-link" href="/keywords">Keywords</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
            </ul>
            <span class="navbar-text user-bar" id="userInfo"></span>
            <button class="btn btn-outline-light btn-sm ml-2" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Keywords Management</h2>

        <form id="keywordForm" class="mb-3">
            <div class="form-group">
                <label for="keyword">New Keyword:</label>
                <input type="text" id="keyword" class="form-control" required maxlength="255"
                       placeholder="Enter keyword to monitor...">
            </div>
            <button type="submit" class="btn btn-success">Add Keyword</button>
        </form>

        <div class="form-group">
            <label for="search">Search:</label>
            <input type="text" id="search" class="form-control" placeholder="Filter keywords...">
        </div>

        <table class="table table-striped mt-3">
            <thead>
                <tr><th>Keyword</th><th>Added By</th><th>Actions</th></tr>
            </thead>
            <tbody id="keywordList"></tbody>
        </table>
    </div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Keyword</h5>
                    <button type="button" class="close" onclick="closeModal()" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <textarea id="editKeywordInput" class="form-control"
                              style="width:100%; height:150px;" required maxlength="255"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" onclick="saveKeyword()">Save</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
            crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
            crossorigin="anonymous"></script>
    <script>
        const API_BASE = "/keywords";  // Relative URL — no hardcoded host
        let allKeywords = [];
        let editIndex = null;

        function getAuthHeaders() {
            const token = localStorage.getItem('jwt_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            return headers;
        }

        function showUser() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.username) document.getElementById('userInfo').textContent = 'Logged in as: ' + user.username;
        }

        function logout() {
            fetch('/api/auth/logout', { method: 'POST', headers: getAuthHeaders() });
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        // Add keyword
        document.getElementById("keywordForm").addEventListener("submit", function(e) {
            e.preventDefault();
            const keywordInput = document.getElementById("keyword");
            const keyword = keywordInput.value.trim();
            if (!keyword) return;

            fetch(API_BASE + '/add_keyword', {
                method: "POST",
                headers: getAuthHeaders(),
                body: JSON.stringify({ keyword: keyword })
            })
            .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
            .then(data => {
                if (data.success) {
                    loadKeywords();
                    keywordInput.value = "";
                } else {
                    alert(data.error || 'Failed to add keyword');
                }
            })
            .catch(err => console.error('Error:', err));
        });

        function loadKeywords() {
            fetch(API_BASE + '/get_keywords', { headers: getAuthHeaders() })
            .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
            .then(keywords => {
                if (!Array.isArray(keywords)) throw new Error("Invalid format");
                allKeywords = keywords;
                displayKeywords(keywords);
            })
            .catch(err => console.error('Error loading keywords:', err));
        }

        // SAFE: uses textContent + addEventListener, no innerHTML with user data
        function displayKeywords(keywords) {
            const keywordList = document.getElementById("keywordList");
            keywordList.innerHTML = "";

            keywords.forEach(kw => {
                const row = document.createElement("tr");

                const kwCell = document.createElement("td");
                kwCell.textContent = kw.keyword || '';
                row.appendChild(kwCell);

                const byCell = document.createElement("td");
                byCell.textContent = kw.added_by || 'N/A';
                row.appendChild(byCell);

                const actCell = document.createElement("td");

                const editBtn = document.createElement("button");
                editBtn.className = "btn btn-primary btn-sm mr-1";
                editBtn.textContent = "Edit";
                editBtn.addEventListener("click", () => openEditModal(kw.id, kw.keyword));
                actCell.appendChild(editBtn);

                const delBtn = document.createElement("button");
                delBtn.className = "btn btn-danger btn-sm";
                delBtn.textContent = "Delete";
                delBtn.addEventListener("click", () => deleteKeyword(kw.id));
                actCell.appendChild(delBtn);

                row.appendChild(actCell);
                keywordList.appendChild(row);
            });
        }

        function deleteKeyword(id) {
            if (!confirm("Delete this keyword?")) return;
            fetch(API_BASE + '/delete_keyword/' + id, {
                method: "DELETE",
                headers: getAuthHeaders()
            })
            .then(r => r.json())
            .then(data => { if (data.success) loadKeywords(); else alert(data.error || 'Failed'); })
            .catch(err => console.error('Error:', err));
        }

        // SAFE: uses .value assignment (not innerHTML)
        function openEditModal(id, keywordText) {
            editIndex = id;
            document.getElementById("editKeywordInput").value = keywordText;
            document.getElementById("editModal").style.display = "block";
        }

        function saveKeyword() {
            const newKeyword = document.getElementById("editKeywordInput").value.trim();
            if (!newKeyword || !editIndex) return;

            fetch(API_BASE + '/update_keyword/' + editIndex, {
                method: "PUT",
                headers: getAuthHeaders(),
                body: JSON.stringify({ new_name: newKeyword })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) { closeModal(); loadKeywords(); }
                else alert(data.error || 'Failed');
            })
            .catch(err => console.error('Error:', err));
        }

        function closeModal() {
            document.getElementById("editModal").style.display = "none";
            editIndex = null;
        }

        function filterKeywords() {
            const q = document.getElementById("search").value.trim().toLowerCase();
            displayKeywords(allKeywords.filter(kw => kw.keyword.toLowerCase().includes(q)));
        }

        document.getElementById("search").addEventListener("input", filterKeywords);
        window.onload = function() { showUser(); loadKeywords(); };
    </script>
</body>
</html>
