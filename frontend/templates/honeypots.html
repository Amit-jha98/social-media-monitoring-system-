<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeypot Manager - ANMS</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">
    <style>.user-bar { color: #ccc; font-size: 0.9em; }</style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="/">ANMS Monitoring</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item active"><a class="nav-link" href="/honeypots">Honeypots</a></li>
                <li class="nav-item"><a class="nav-link" href="/keywords">Keywords</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports">Reports</a></li>
            </ul>
            <span class="navbar-text user-bar" id="userInfo"></span>
            <button class="btn btn-outline-light btn-sm ml-2" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center">Honeypot Management</h1>
        <p class="text-center text-muted">Admin-only: Manage undercover monitoring profiles</p>
        <hr>

        <div id="alertBox" class="alert" style="display: none;" role="alert"></div>

        <!-- Create Honeypot Profile -->
        <div class="card mb-4">
            <div class="card-header"><h4>Create Honeypot Profile</h4></div>
            <div class="card-body">
                <form id="createHoneypotForm">
                    <div class="form-group">
                        <label for="platform">Platform</label>
                        <select id="platform" class="form-control" required>
                            <option value="">Select platform...</option>
                            <option value="Telegram">Telegram</option>
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Instagram">Instagram</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" class="form-control" placeholder="Enter username" required maxlength="100">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="Min 8 characters" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="Enter email" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Profile</button>
                </form>
            </div>
        </div>

        <!-- View All Profiles -->
        <div class="card mb-4">
            <div class="card-header"><h4>All Honeypot Profiles</h4></div>
            <div class="card-body">
                <button class="btn btn-secondary mb-3" id="refreshProfiles">Refresh</button>
                <table class="table table-striped" id="profilesTable">
                    <thead>
                        <tr><th>ID</th><th>Platform</th><th>Username</th><th>Email</th><th>Actions</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"
            integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0="
            crossorigin="anonymous"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"
            crossorigin="anonymous"></script>
    <script>
        const API_URL = "/api";  // Relative URL — no hardcoded host

        function getAuthHeaders() {
            const token = localStorage.getItem('jwt_token');
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = 'Bearer ' + token;
            return headers;
        }

        function showUser() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.username) document.getElementById('userInfo').textContent = 'Logged in as: ' + user.username;
        }

        function logout() {
            fetch('/api/auth/logout', { method: 'POST', headers: getAuthHeaders() });
            localStorage.removeItem('jwt_token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        function showAlert(message, type) {
            const box = document.getElementById('alertBox');
            box.textContent = message;
            box.className = 'alert alert-' + type;
            box.style.display = 'block';
            setTimeout(() => { box.style.display = 'none'; }, 4000);
        }

        // Create Profile
        document.getElementById("createHoneypotForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const formData = {
                platform: document.getElementById("platform").value.trim(),
                username: document.getElementById("username").value.trim(),
                password: document.getElementById("password").value,
                email: document.getElementById("email").value.trim(),
            };
            if (!formData.platform || !formData.username || !formData.password || !formData.email) return;
            try {
                const response = await fetch(API_URL + '/create_honeypot_profile', {
                    method: "POST",
                    headers: getAuthHeaders(),
                    body: JSON.stringify(formData),
                });
                const result = await response.json();
                if (response.ok) {
                    showAlert(result.message || "Profile created!", "success");
                    document.getElementById("createHoneypotForm").reset();
                    fetchProfiles();
                } else {
                    showAlert(result.error || "Creation failed", "danger");
                }
            } catch (error) {
                showAlert("Network error. Please try again.", "danger");
            }
        });

        // Fetch Profiles — SAFE: uses textContent, no innerHTML with user data
        async function fetchProfiles() {
            const tableBody = document.querySelector("#profilesTable tbody");
            tableBody.innerHTML = "";
            try {
                const response = await fetch(API_URL + '/view_honeypot_profiles', { headers: getAuthHeaders() });
                if (!response.ok) throw new Error('Failed');
                const profiles = await response.json();

                (Array.isArray(profiles) ? profiles : []).forEach((profile) => {
                    const row = document.createElement("tr");

                    const idCell = document.createElement("td");
                    idCell.textContent = profile.id;
                    row.appendChild(idCell);

                    const platCell = document.createElement("td");
                    platCell.textContent = profile.platform || '';
                    row.appendChild(platCell);

                    const userCell = document.createElement("td");
                    userCell.textContent = profile.username || '';
                    row.appendChild(userCell);

                    const emailCell = document.createElement("td");
                    emailCell.textContent = profile.email || '';
                    row.appendChild(emailCell);

                    const actCell = document.createElement("td");
                    const delBtn = document.createElement("button");
                    delBtn.className = "btn btn-danger btn-sm";
                    delBtn.textContent = "Delete";
                    delBtn.addEventListener("click", () => deleteProfile(profile.id));
                    actCell.appendChild(delBtn);
                    row.appendChild(actCell);

                    tableBody.appendChild(row);
                });
            } catch (error) {
                showAlert("Failed to load profiles.", "warning");
            }
        }

        document.getElementById("refreshProfiles").addEventListener("click", fetchProfiles);

        async function deleteProfile(profileId) {
            if (!confirm("Are you sure you want to delete this profile?")) return;
            try {
                const response = await fetch(API_URL + '/delete_honeypot_profile', {
                    method: "DELETE",
                    headers: getAuthHeaders(),
                    body: JSON.stringify({ profile_id: profileId }),
                });
                const result = await response.json();
                if (response.ok) {
                    showAlert(result.message || "Deleted!", "success");
                    fetchProfiles();
                } else {
                    showAlert(result.error || "Delete failed", "danger");
                }
            } catch (error) {
                showAlert("Network error.", "danger");
            }
        }

        window.onload = function() { showUser(); fetchProfiles(); };
    </script>
</body>
</html>
