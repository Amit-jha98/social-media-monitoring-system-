<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ANMS</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z"
          crossorigin="anonymous">
    <style>
        body { background-color: #f4f6f9; }
        .login-container {
            max-width: 420px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .login-container h2 { text-align: center; margin-bottom: 25px; color: #343a40; }
        .alert { display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>ANMS Login</h2>
        <div id="alertBox" class="alert" role="alert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-control" placeholder="Enter username"
                       required minlength="3" maxlength="50" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password"
                       required minlength="8" maxlength="128" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        <p class="text-center mt-3">
            Don't have an account? <a href="/register">Register here</a>
        </p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const alertBox = document.getElementById("alertBox");
            alertBox.style.display = "none";

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token
                    localStorage.setItem("jwt_token", data.token);
                    localStorage.setItem("user", JSON.stringify(data.user));
                    window.location.href = "/";
                } else {
                    alertBox.className = "alert alert-danger";
                    alertBox.textContent = data.error || "Login failed";
                    alertBox.style.display = "block";
                }
            } catch (err) {
                alertBox.className = "alert alert-danger";
                alertBox.textContent = "Network error. Please try again.";
                alertBox.style.display = "block";
            }
        });
    </script>
</body>
</html>
